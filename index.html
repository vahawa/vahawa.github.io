<!DOCTYPE html><html lang="de"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0b0c" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f2f2f4" media="(prefers-color-scheme: light)">
  <title>BVG Express</title>
  <link rel="apple-touch-icon" id="appIcon">

  <style>
    :root{
      --bg:#f2f2f4; --card:#ffffff; --border:#d8d8dc;
      --text:#1a1a1e; --muted:#6b6b73;
      --ok:#16a34a; --err:#e11d48; --accent:#0284c7;
      --ok-border:rgba(22,163,74,.3); --err-border:rgba(225,29,72,.3); --accent-border:rgba(2,132,199,.3);
      --card-overlay:rgba(0,0,0,0.03);
      --r:14px;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#0b0b0c; --card:#141417; --border:#26262b;
        --text:#f2f2f4; --muted:#a7a7ad;
        --ok:#86efac; --err:#fb7185; --accent:#7dd3fc;
        --ok-border:rgba(134,239,172,.35); --err-border:rgba(251,113,133,.35); --accent-border:rgba(125,211,252,.35);
        --card-overlay:rgba(255,255,255,0.03);
      }
    }
    *{box-sizing:border-box}
    body{
      margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
      padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 14px);
      -webkit-font-smoothing: antialiased;
    }
    header{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px;}
    h1{margin:0; font-size:18px}
    .sub{margin-top:4px; font-size:12px; color:var(--muted); line-height:1.25}
    .btns{display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end}
    button{
      background:var(--card); border:1px solid var(--border); color:var(--text);
      padding:10px 12px; border-radius:12px; font-size:13px; line-height:1; min-width:44px;
    }
    button:active{transform:translateY(1px)}
    button.active{border-color:var(--accent); color:var(--accent)}
    .info-btn{padding:10px; min-width:40px; font-size:15px; font-weight:700; line-height:1}
    .overlay{
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .overlay-box{
      background:var(--card); border:1px solid var(--border); border-radius:var(--r);
      padding:20px; max-width:340px; width:100%; font-size:14px; line-height:1.5;
    }
    .overlay-box h2{margin:0 0 10px; font-size:16px}
    .overlay-box p{margin:0 0 12px; color:var(--muted)}
    .overlay-box strong{color:var(--text)}
    .overlay-box .close-btn{
      width:100%; margin-top:4px; padding:12px; border-radius:12px;
      font-size:14px; font-weight:600;
    }
    .pill{
      display:flex; align-items:center; gap:8px;
      border:1px solid var(--border);
      background:var(--card-overlay);
      padding:8px 10px; border-radius:999px;
      font-size:12px; color:var(--muted);
      margin: 8px 0 12px;
    }
    .dot{width:8px; height:8px; border-radius:999px; background:var(--muted)}
    .dot.ok{background:var(--ok)}
    .dot.err{background:var(--err)}
    .status{
      background:var(--card-overlay);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:12px 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      margin-bottom:10px;
    }
    .grid{display:grid; gap:10px}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:12px;
      display:grid;
      gap:10px;
    }
    .stop-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:14px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      transition:border-color .15s;
    }
    .stop-card:active{border-color:var(--accent)}
    .stop-name{font-size:15px; font-weight:600}
    .stop-dist{font-size:13px; color:var(--muted); white-space:nowrap}
    .stop-arrow{color:var(--muted); font-size:16px}
    .toprow{display:flex; justify-content:space-between; gap:10px; align-items:flex-start}
    .time{font-family:var(--mono); font-size:22px; line-height:1; letter-spacing:.2px}
    .badges{display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end}
    .badge{
      font-size:12px; padding:5px 8px; border-radius:999px;
      border:1px solid var(--border);
      background:var(--card-overlay);
      color:var(--muted);
      white-space:nowrap;
    }
    .badge.ok{color:var(--ok); border-color: var(--ok-border)}
    .badge.err{color:var(--err); border-color: var(--err-border)}
    .badge.accent{color:var(--accent); border-color: var(--accent-border)}
    .route{display:flex; gap:10px; align-items:baseline}
    .line{font-weight:700; font-size:16px}
    .dir{
      color:var(--muted); font-size:13px; line-height:1.3;
      overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    }
    .meta{
      display:flex; justify-content:space-between; gap:10px;
      border-top:1px solid var(--border);
      padding-top:10px;
      color:var(--muted);
      font-size:12px;
    }
    .mono{font-family:var(--mono)}
  </style>
</head>

<body>
  <header>
    <div>
      <h1>BVG Express</h1>
      <div class="sub" id="subtitle">Standort abrufen…</div>
    </div>
    <div class="btns">
      <button id="btnInfo" class="info-btn" title="Info">ⓘ</button>
      <button id="btnRefresh" title="Aktualisieren">↻</button>
      <button id="btnStop" title="Haltestelle wählen">Haltestelle</button>
      <button id="btnRadius" title="Radius ändern">Radius</button>
      <button id="btnCount" title="Anzahl Abfahrten ändern">Abfahrten</button>
    </div>
  </header>

  <div class="pill">
    <span class="dot" id="dot"></span>
    <span id="pillText">Bereit</span>
  </div>

  <div class="status" id="status">—</div>
  <div class="grid" id="list" aria-live="polite"></div>

<script>
(() => {
  const API_BASE = "https://v6.bvg.transport.rest";
  const TZ = "Europe/Berlin";
  const STORAGE_KEY = "bvg_settings";
  const AUTO_REFRESH_MS = 30_000;

  const subtitle = document.getElementById("subtitle");
  const statusEl = document.getElementById("status");
  const listEl = document.getElementById("list");
  const dotEl = document.getElementById("dot");
  const pillTextEl = document.getElementById("pillText");
  const btnStop = document.getElementById("btnStop");

  const defaults = {
    radius_m: 500,
    max_results: 10,
    nearby_limit: 18,
    dep_results_per_stop: 10,
    dep_duration_min: 90,
    lang: "de",
    loc_timeout_ms: 10000,
    req_timeout_ms: 7000,
  };

  const state = { ...defaults, ...loadSettings() };
  let refreshTimer = null;
  let cachedStops = [];
  let filterStop = null;
  let viewMode = "departures"; // "departures" | "stops"

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      const parsed = JSON.parse(raw);
      return typeof parsed === "object" && parsed !== null ? parsed : {};
    } catch { return {}; }
  }

  function saveSettings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        radius_m: state.radius_m,
        max_results: state.max_results,
      }));
    } catch {}
  }

  function scheduleRefresh() {
    clearTimeout(refreshTimer);
    if (viewMode === "departures") {
      refreshTimer = setTimeout(loadDepartures, AUTO_REFRESH_MS);
    }
  }

  function updateStopButton() {
    if (filterStop) {
      btnStop.textContent = filterStop.name;
      btnStop.classList.add("active");
    } else {
      btnStop.textContent = "Haltestelle";
      btnStop.classList.remove("active");
    }
  }

  function setPill(kind, text){
    dotEl.className = "dot" + (kind ? (" " + kind) : "");
    pillTextEl.textContent = text;
  }

  function fmtDistance(m){
    if (m == null) return "";
    const n = Number(m);
    if (!isFinite(n)) return "";
    if (n < 1000) return `${Math.round(n)} m`;
    return `${(n/1000).toFixed(1)} km`;
  }

  function isoToLocalTime(iso){
    const d = new Date(iso);
    return new Intl.DateTimeFormat("de-DE", {
      timeZone: TZ,
      hour: "2-digit",
      minute: "2-digit"
    }).format(d);
  }

  function fmtTime(){
    return new Intl.DateTimeFormat("de-DE", {
      timeZone: TZ, hour: "2-digit", minute: "2-digit", second: "2-digit"
    }).format(new Date());
  }

  function nowISO(){
    return new Date().toISOString();
  }

  async function fetchJSON(url, params){
    const u = new URL(url);
    Object.entries(params || {}).forEach(([k,v]) => u.searchParams.set(k, String(v)));
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), state.req_timeout_ms);
    try{
      const res = await fetch(u.toString(), {
        signal: controller.signal,
        headers: { "accept": "application/json" }
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } finally {
      clearTimeout(t);
    }
  }

  function parseNearbyStops(payload){
    const items = Array.isArray(payload)
      ? payload
      : (payload?.nearby || payload?.results || payload?.locations || []);
    const out = [];
    for(const it of (items || [])){
      if(!it || typeof it !== "object") continue;
      if(it.type !== "stop") continue;
      if(!it.id || !it.name) continue;
      const dist = Math.round(Number(it.distance ?? 999999));
      out.push({ id: String(it.id), name: String(it.name), distance: isFinite(dist) ? dist : 999999 });
    }
    out.sort((a,b) => a.distance - b.distance);
    return out;
  }

  function computeActualTime(planned, when, delayS) {
    if (when) return new Date(when);
    if (!planned) return null;
    const base = new Date(planned);
    if (Number.isNaN(base.getTime())) return null;
    if (delayS != null && isFinite(Number(delayS))) {
      return new Date(base.getTime() + Number(delayS) * 1000);
    }
    return base;
  }

  function parseDepartures(payload, stop, nowMillis){
    const deps = Array.isArray(payload)
      ? payload
      : (payload?.departures || payload?.results || []);
    const rows = [];
    for(const d of (deps || [])){
      if(!d || typeof d !== "object") continue;

      const dt = computeActualTime(d.plannedWhen, d.when, d.delay);
      if (!dt || Number.isNaN(dt.getTime())) continue;
      if (dt.getTime() < nowMillis) continue;

      const delayS = d.delay;
      const delayMin = (delayS == null) ? null : Math.round(Number(delayS)/60);
      const delayTxt = (delayMin == null) ? "pünktlich" : (delayMin > 0 ? `+${delayMin}` : (delayMin === 0 ? "pünktlich" : `${delayMin}`));

      const lineObj = d.line;
      const route = (lineObj && typeof lineObj === "object")
        ? (lineObj.name || lineObj.id || "")
        : (lineObj || "");

      rows.push({
        when_dt: dt,
        time: isoToLocalTime(dt.toISOString()),
        delay: delayTxt,
        route: String(route),
        headsign: String(d.direction || ""),
        platform: String(d.platform || d.plannedPlatform || ""),
        stop_id: stop.id,
        stop_name: stop.name,
        distance_m: stop.distance,
        is_cancelled: Boolean(d.cancelled || d.tripCancelled),
        trip_id: d.tripId || null,
      });
    }
    return rows;
  }

  function dedupSort(rows, limit){
    rows.sort((a,b) => (a.when_dt - b.when_dt) || (a.distance_m - b.distance_m));
    const seen = new Set();
    const out = [];
    for(const r of rows){
      const key = r.trip_id
        ? r.trip_id
        : [r.when_dt.getTime(), r.route, r.headsign].join("|");
      if(seen.has(key)) continue;
      seen.add(key);
      out.push(r);
      if(out.length >= limit) break;
    }
    return out;
  }

  function clearList(){
    while(listEl.firstChild) listEl.removeChild(listEl.firstChild);
  }

  function renderDepartures(rows, showStop){
    clearList();

    if(!rows.length){
      const box = document.createElement("div");
      box.className = "status";
      box.textContent = "Keine Abfahrten gefunden.";
      listEl.appendChild(box);
      return;
    }

    for(const r of rows){
      const card = document.createElement("div");
      card.className = "card";

      const top = document.createElement("div");
      top.className = "toprow";

      const time = document.createElement("div");
      time.className = "time";
      time.textContent = r.time;

      const badges = document.createElement("div");
      badges.className = "badges";

      const delayBadge = document.createElement("span");
      delayBadge.className = "badge " + (r.is_cancelled ? "err" : (r.delay === "pünktlich" ? "ok" : "accent"));
      delayBadge.textContent = r.is_cancelled ? "Fällt aus" : r.delay;

      badges.appendChild(delayBadge);

      if(r.platform){
        const platBadge = document.createElement("span");
        platBadge.className = "badge";
        platBadge.textContent = `Gl. ${r.platform}`;
        badges.appendChild(platBadge);
      }

      if(showStop){
        const distBadge = document.createElement("span");
        distBadge.className = "badge";
        distBadge.textContent = fmtDistance(r.distance_m);
        badges.appendChild(distBadge);
      }

      top.appendChild(time);
      top.appendChild(badges);

      const routeRow = document.createElement("div");
      routeRow.className = "route";

      const line = document.createElement("div");
      line.className = "line";
      line.textContent = r.route || "—";

      const dir = document.createElement("div");
      dir.className = "dir";
      dir.textContent = r.headsign || "—";

      routeRow.appendChild(line);
      routeRow.appendChild(dir);

      card.appendChild(top);
      card.appendChild(routeRow);

      if(showStop){
        const meta = document.createElement("div");
        meta.className = "meta";
        const stopName = document.createElement("div");
        stopName.textContent = r.stop_name;
        meta.appendChild(stopName);
        card.appendChild(meta);
      }

      listEl.appendChild(card);
    }
  }

  function renderStops(stops){
    clearList();
    viewMode = "stops";

    if(!stops.length){
      const box = document.createElement("div");
      box.className = "status";
      box.textContent = `Keine Haltestellen im Umkreis (${state.radius_m} m).`;
      listEl.appendChild(box);
      return;
    }

    // "Alle" option to clear filter
    const allCard = document.createElement("div");
    allCard.className = "stop-card";
    if (!filterStop) allCard.style.borderColor = "var(--accent)";
    allCard.addEventListener("click", () => {
      filterStop = null;
      updateStopButton();
      loadDepartures();
    });
    const allLeft = document.createElement("div");
    const allName = document.createElement("div");
    allName.className = "stop-name";
    allName.textContent = "Alle Haltestellen";
    allName.style.color = filterStop ? "var(--text)" : "var(--accent)";
    const allDist = document.createElement("div");
    allDist.className = "stop-dist";
    allDist.textContent = `${stops.length} Stops`;
    allLeft.appendChild(allName);
    allLeft.appendChild(allDist);
    allCard.appendChild(allLeft);
    listEl.appendChild(allCard);

    for(const s of stops){
      const card = document.createElement("div");
      card.className = "stop-card";
      if (filterStop && filterStop.id === s.id) card.style.borderColor = "var(--accent)";
      card.addEventListener("click", () => {
        filterStop = s;
        updateStopButton();
        loadDepartures();
      });

      const left = document.createElement("div");
      const name = document.createElement("div");
      name.className = "stop-name";
      name.textContent = s.name;
      if (filterStop && filterStop.id === s.id) name.style.color = "var(--accent)";
      const dist = document.createElement("div");
      dist.className = "stop-dist";
      dist.textContent = fmtDistance(s.distance);
      left.appendChild(name);
      left.appendChild(dist);

      const arrow = document.createElement("div");
      arrow.className = "stop-arrow";
      arrow.textContent = "›";

      card.appendChild(left);
      card.appendChild(arrow);
      listEl.appendChild(card);
    }
  }

  function getLocation(){
    return new Promise((resolve, reject) => {
      if(!navigator.geolocation) return reject(new Error("Geolocation nicht verfügbar."));
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          acc: pos.coords.accuracy
        }),
        (err) => reject(new Error(err.message || "Standort konnte nicht abgerufen werden.")),
        { enableHighAccuracy: true, timeout: state.loc_timeout_ms, maximumAge: 15000 }
      );
    });
  }

  async function loadDepartures(){
    clearTimeout(refreshTimer);
    viewMode = "departures";
    clearList();

    try{
      setPill("", "Lade…");
      statusEl.textContent = "Standort wird abgerufen…";
      subtitle.textContent = "GPS + BVG API";

      const loc = await getLocation();
      subtitle.textContent = `📍 ${loc.lat.toFixed(5)}, ${loc.lon.toFixed(5)} (±${Math.round(loc.acc)} m)`;

      // fetch nearby stops (needed for unfiltered view + to update cache)
      const nearbyPayload = await fetchJSON(`${API_BASE}/locations/nearby`, {
        latitude: loc.lat,
        longitude: loc.lon,
        distance: state.radius_m,
        results: state.nearby_limit,
        stops: "true",
        poi: "false",
        pretty: "false",
      });

      const nearby = parseNearbyStops(nearbyPayload);
      cachedStops = nearby;

      const stopsToQuery = filterStop
        ? nearby.filter(s => s.id === filterStop.id)
        : nearby;

      if(!stopsToQuery.length){
        setPill("err", filterStop ? "Stop nicht gefunden" : "Keine Stops");
        statusEl.textContent = filterStop
          ? `${filterStop.name} nicht im Umkreis (${state.radius_m} m).`
          : "Keine Haltestellen im Umkreis gefunden.";
        renderDepartures([], !filterStop);
        scheduleRefresh();
        return;
      }

      const label = filterStop ? filterStop.name : `${stopsToQuery.length} Haltestellen`;
      statusEl.textContent = `Lade Abfahrten (${label})…`;

      const when = nowISO();
      const nowMillis = Date.now();

      const perStop = await Promise.all(
        stopsToQuery.map(async (stop) => {
          try{
            const dep = await fetchJSON(`${API_BASE}/stops/${encodeURIComponent(stop.id)}/departures`, {
              when,
              results: filterStop
                ? Math.max(state.max_results, state.dep_results_per_stop)
                : state.dep_results_per_stop,
              duration: state.dep_duration_min,
              remarks: "false",
              language: state.lang,
              pretty: "false",
            });
            return parseDepartures(dep, stop, nowMillis);
          } catch {
            return [];
          }
        })
      );

      const combined = perStop.flat();
      const rows = dedupSort(combined, state.max_results);

      if(!rows.length){
        setPill("err", "Keine Abfahrten");
        statusEl.textContent = "Keine Echtzeit-Abfahrten gefunden.";
        renderDepartures([], !filterStop);
        scheduleRefresh();
        return;
      }

      setPill("ok", "Aktuell");
      const filterLabel = filterStop ? ` · ${filterStop.name}` : "";
      statusEl.textContent = `${rows.length} Abfahrten${filterLabel} · ${fmtTime()}`;
      renderDepartures(rows, !filterStop);

    } catch(e){
      setPill("err", "Fehler");
      statusEl.textContent = `Fehler: ${e?.message || e}`;
      renderDepartures([], false);
    } finally {
      scheduleRefresh();
    }
  }

  function showStopPicker(){
    if (viewMode === "stops") {
      // already showing stops — go back to departures
      loadDepartures();
      return;
    }
    if (!cachedStops.length) {
      // no cached stops yet — need to load first
      loadDepartures();
      return;
    }
    clearTimeout(refreshTimer);
    setPill("ok", "Aktuell");
    statusEl.textContent = "Haltestelle auswählen:";
    renderStops(cachedStops);
  }

  function changeRadius(){
    const r = prompt("Radius in Metern (50–2000):", String(state.radius_m));
    if(r != null){
      const v = Math.max(50, Math.min(2000, parseInt(r,10) || state.radius_m));
      state.radius_m = v;
      saveSettings();
      loadDepartures();
    }
  }

  function changeCount(){
    const m = prompt("Max. Abfahrten anzeigen (1–20):", String(state.max_results));
    if(m != null){
      const v = Math.max(1, Math.min(20, parseInt(m,10) || state.max_results));
      state.max_results = v;
      saveSettings();
      if (viewMode === "departures") loadDepartures();
    }
  }

  document.getElementById("btnInfo").addEventListener("click", () => {
    const ov = document.createElement("div");
    ov.className = "overlay";
    ov.addEventListener("click", (e) => { if(e.target === ov) ov.remove(); });
    ov.innerHTML = `<div class="overlay-box">
      <h2>BVG Express</h2>
      <p>Ziel dieser Anwendung ist, auf dem schnellsten Weg die relevanten Abfahrten zu finden.</p>
      <p><strong>Als App speichern:</strong></p>
      <p><strong>iPhone:</strong> Im Safari auf <em>Teilen</em> (⬆) tippen → <em>Zum Home-Bildschirm</em> wählen.</p>
      <p><strong>Android:</strong> Im Chrome auf <em>Menü</em> (⋮) tippen → <em>Zum Startbildschirm hinzufügen</em> wählen.</p>
      <button class="close-btn" onclick="this.closest('.overlay').remove()">Schließen</button>
    </div>`;
    document.body.appendChild(ov);
  });

  document.getElementById("btnRefresh").addEventListener("click", loadDepartures);
  btnStop.addEventListener("click", showStopPicker);
  document.getElementById("btnRadius").addEventListener("click", changeRadius);
  document.getElementById("btnCount").addEventListener("click", changeCount);

  updateStopButton();
  loadDepartures();
})();

// Generate app icon (BVG yellow + train/lightning pictogram)
(() => {
  const s = 180;
  const c = document.createElement("canvas");
  c.width = s; c.height = s;
  const x = c.getContext("2d");

  // BVG yellow background
  x.fillStyle = "#F0D722";
  x.fillRect(0, 0, s, s);

  // Train body (front view) - dark outline style
  const cx = 90, trainW = 80, trainH = 100;
  const tl = cx - trainW/2, tt = 28;

  // Main body
  x.fillStyle = "#1a1a1e";
  x.beginPath();
  x.moveTo(tl + 10, tt);
  x.lineTo(tl + trainW - 10, tt);
  x.quadraticCurveTo(tl + trainW, tt, tl + trainW, tt + 10);
  x.lineTo(tl + trainW, tt + trainH - 8);
  x.quadraticCurveTo(tl + trainW, tt + trainH, tl + trainW - 8, tt + trainH);
  x.lineTo(tl + 8, tt + trainH);
  x.quadraticCurveTo(tl, tt + trainH, tl, tt + trainH - 8);
  x.lineTo(tl, tt + 10);
  x.quadraticCurveTo(tl, tt, tl + 10, tt);
  x.fill();

  // Windshield
  x.fillStyle = "#F0D722";
  x.beginPath();
  x.roundRect(tl + 10, tt + 10, trainW - 20, 34, 6);
  x.fill();

  // Two side windows
  x.beginPath();
  x.roundRect(tl + 10, tt + 52, 22, 18, 3);
  x.fill();
  x.beginPath();
  x.roundRect(tl + trainW - 32, tt + 52, 22, 18, 3);
  x.fill();

  // Headlights
  x.fillStyle = "#F0D722";
  x.beginPath();
  x.arc(tl + 16, tt + trainH - 12, 6, 0, Math.PI * 2);
  x.fill();
  x.beginPath();
  x.arc(tl + trainW - 16, tt + trainH - 12, 6, 0, Math.PI * 2);
  x.fill();

  // Wheels / rail bar
  x.fillStyle = "#1a1a1e";
  x.beginPath();
  x.roundRect(tl - 2, tt + trainH + 4, trainW + 4, 8, 4);
  x.fill();

  // Lightning bolt - solid filled
  x.fillStyle = "#F0D722";
  x.lineJoin = "round";
  x.beginPath();
  x.moveTo(102, 22);
  x.lineTo(78, 88);
  x.lineTo(98, 88);
  x.lineTo(76, 158);
  x.lineTo(108, 96);
  x.lineTo(88, 96);
  x.lineTo(102, 22);
  x.closePath();
  x.fill();

  // Set as apple-touch-icon
  document.getElementById("appIcon").href = c.toDataURL("image/png");
})();
</script>
